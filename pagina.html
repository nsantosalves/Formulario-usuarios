<!DOCTYPE html>

<html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <title>Portal de Cadastro | Sistema de Usuários</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Formulário para cadastro</h1>

    <form>
        <label><strong>Nome completo: </strong></label>
        <input type="text" id="nome" placeholder="Digite seu nome "required>
        
        <label><strong>Digite sua idade: </strong></label>
        <input type="number" id="idade" placeholder="Digite sua idade" required>

        <label><strong>Digite seu email: </strong></label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <br><br>

        <button type="button" onclick="salvar()"><strong>Salvar dados</strong></button>
    </form>

    <br><br>

    <table border="5">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="Minha-tabela"></tbody>
    </table>

    </footer>

</body>
</html>
